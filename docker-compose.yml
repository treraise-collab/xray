version: '3.8'

services:
  xray:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-server
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./config.json:/etc/xray/config.json:ro
      - ./cert.pem:/etc/xray/cert.pem:ro
      - ./key.pem:/etc/xray/key.pem:ro
    restart: unless-stopped
    networks:
      - xray-network

networks:
  xray-network:
    driver: bridge